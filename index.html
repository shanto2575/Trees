<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- DaisyUI Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Trees</title>
</head>

<body>
    <main class="container mx-auto">
        <section class=" text-center mt-5">
            <h1 class="text-2xl text-center font-bold text-green-700">Chose Your Trees</h1>
            <div class="grid grid-cols-12 gap-8 mt-10">
                <!-- left section -->
                <div class="col-span-3  space-y-2">
                    <h2 class="font-bold text-xl">Categories</h2>
                    <div class="space-y-3 sticky top-5">
                        <button class="btn btn-success w-full p-1 rounded-md" id="allTreebtn">All Trees</button>

                        <!-- categoriesContainer -->
                        <dev id="CategoriesContainer" class="space-y-3">
                        </dev>
                    </div>
                </div>



                <!-- center section -->
                <div class="col-span-6" 0>
                    <div id="treeContainer" class="grid grid-cols-1 md:grid-cols-3 gap-5">
                    </div>

                    <!-- loadingSpiner -->
                    <div id="loadingSpiner" class="m-10 hidden">
                        <span class="loading loading-spinner text-info"></span>
                        <span class="loading loading-spinner text-success"></span>
                        <span class="loading loading-spinner text-warning"></span>
                        <span class="loading loading-spinner text-error"></span>
                    </div>
                </div>


                <!-- right section -->
                <div class="bg-white card shadow-xl col-span-3 ">
                    <h1 class="text-3xl font-bold"><i class="fa-solid fa-cart-arrow-down"></i> Cart</h1>
                    <div class="space-y-3 m-3 sticky top-5">
                        <!-- cart -->
                        <div id="cartContainer" class="space-y-3 ">
                            
                        </div>

                        <!-- empty cart message -->
                        <div id="EmptyCartMessage" class="text-center py-4 hidden">
                            <p>Your Cart is empty</p>
                            <p>Add a trees to ger Start</p>
                        </div>

                        <!-- total Amount -->
                        <div class="bg-green-200 font-bold p-2 m-3 rounded-xl flex justify-between">
                            <span>Total:</span>
                            <p>$<span id="TotalAmount">0</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Product details modal -->
        <dialog id="tree-details-modal" class="modal">
            <div class="modal-box">

                <!-- Modal Header with Close Button -->
                <div class="flex justify-between items-start mb-4">
                    <h3 class="font-bold text-2xl text-green-700" id="modalTitle">Tree Details</h3>
                    <button class="btn btn-sm btn-circle btn-ghost"
                        onclick="document.getElementById('tree-details-modal').close()">✕</button>
                </div>

                <!-- Modal Content -->
                <div class=" gap-6">
                    <!-- Plant Image -->
                    <img id="modalImage" src="" alt="plant" class="w-full !h-[250px] object-cover rounded-lg mb-12">

                    <!-- Plant Details -->
                    <div class="">
                        <p class="text-sm text-gray-500 mb-2">
                            <span class="font-bold">Category:</span>
                            <span id="modalCategory" class="badge badge-primary"></span>
                        </p>
                        <p class="text-sm text-gray-600 mb-4">
                            <span id="modalDescription"></span>
                        </p>
                        <div class="flex items-baseline gap-2 mb-6">
                            <span class="text-3xl font-bold text-green-600">$<span id="modalPrice">0</span></span>
                        </div>
                    </div>
                </div>


                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </main>

    <script src="./script.js"></script>
</body>

</html>
