<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyUi and Tailwindcss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./assets/tree-removebg-preview.png" type="image/x-icon">
    <link rel="stylesheet" href="./style/style.css">
    <title>GitHub-Issues-Tracker</title>
</head>

<body>
    <main class="flex justify-center items-center mt-20">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xl border p-4 space-y-2">

            <div class="w-1/2 mx-auto text-center space-y-2">
                <div class="flex justify-center items-center mb-5">
                    <img src="./assets/github-logo.png" alt="">
                </div>
                <p class="text-4xl font-bold text-green-700">Green Earth</p>
                <p class="text-lg text-gray-400">Manage your environmental issues and contribute to a greener planet.</p>
            </div>

            <label class="label text-lg font-bold ">Email</label>
            <input type="email" id="inputEmail" class="input w-full outline-none" placeholder="Email" />

            <label class="label text-lg font-bold ">Password</label>
            <input type="password" id="inputPassword" class="input w-full outline-none" placeholder="Password" />

            <button id="logingBtn" class="btn btn-primary mt-4 text-lg">Login</button>
            <div class="flex items-center my-6">
                <div class="flex-grow border-t"></div>
                <span class="mx-4 text-gray-500">OR</span>
                <div class="flex-grow border-t"></div>
            </div>
            <div class="text-center">
                <p class="text-lg font-semibold">Username: <span class="text-orange-700">admin</span></p>
                <p class="text-lg font-semibold">Password: <span class="text-orange-700">admin123</span></p>
            </div>
        </fieldset>

    </main>
    <script src="./login.js"></script>
</body>

</html>
